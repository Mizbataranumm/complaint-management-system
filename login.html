<script>

const API_BASE = "https://complaint-api-ukmi.onrender.com";

async function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value.trim();
  var role     = document.getElementById('role').value;
  var btn      = document.getElementById('login-btn');
  var errMsg   = document.getElementById('error-msg');
  var errText  = document.getElementById('error-text');

  errMsg.classList.add('hidden');

  if (!email || email.indexOf('@') === -1) {
    errText.textContent = 'Please enter a valid email address.';
    errMsg.classList.remove('hidden');
    return;
  }

  if (!password) {
    errText.textContent = 'Password is required.';
    errMsg.classList.remove('hidden');
    return;
  }

  if (!role) {
    errText.textContent = 'Please select your role.';
    errMsg.classList.remove('hidden');
    return;
  }

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {

    var response = await fetch(API_BASE + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: email,
        password: password,
        role: role
      })
    });

    var data = await response.json();

    if (data.success) {

      sessionStorage.setItem("cms_user", JSON.stringify(data.user));

      // Redirect to dashboard
      window.location.href = "dashboard.html";

    } else {

      errText.textContent = data.message || "Invalid login.";
      errMsg.classList.remove("hidden");

      btn.textContent = "🔐 Sign In";
      btn.disabled = false;

    }

  } catch (err) {

    errText.textContent = "Cannot connect to server.";
    errMsg.classList.remove("hidden");

    btn.textContent = "🔐 Sign In";
    btn.disabled = false;

  }
}

document.addEventListener("keydown", function(e){
  if(e.key === "Enter") doLogin();
});

</script>
